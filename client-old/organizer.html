<!DOCTYPE html>
<html class="dark" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>NodeMap - Panel de Organizador</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: { primary: "#ffb3ad", background: "#13121d" },
                    fontFamily: { sans: ["Montserrat", "sans-serif"], logo: ["Space Grotesk", "sans-serif"] }
                }
            }
        }
    </script>
    <style>
        body { background-color: #13121d; color: #e5e0f0; margin: 0; }
        .glass-card { background: rgba(21, 20, 31, 0.92); backdrop-filter: blur(20px); border: 1px solid rgba(255, 84, 81, 0.35); }
        .input-field { background: #0c0b15 !important; border: 1px solid rgba(255, 84, 81, 0.45); color: #f0ece6; outline: none; transition: all 0.25s ease; }
        .input-field:focus { border-color: rgba(255, 84, 81, 0.8); box-shadow: 0 0 0 3px rgba(255, 84, 81, 0.15); }
        .btn-primary { background: linear-gradient(135deg, #ff5451 0%, #d63b38 100%); color: #fff; font-weight: 600; transition: all 0.25s ease; }
        .btn-primary:hover:not(:disabled) { box-shadow: 0 4px 20px rgba(255, 84, 81, 0.5); transform: translateY(-1px); }
        .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
    </style>
</head>
<body class="h-screen w-screen flex flex-col items-center justify-center relative p-4">
    
    <div class="absolute inset-0 z-0 overflow-hidden pointer-events-none">
        <div class="absolute top-0 left-1/4 w-96 h-96 bg-red-500/10  blur-[100px]"></div>
        <div class="absolute bottom-0 right-1/4 w-96 h-96 bg-orange-500/10  blur-[100px]"></div>
    </div>

    <div class="glass-card  p-8 md:p-10 w-full max-w-[500px] relative z-10 shadow-2xl">
        <div class="text-center flex flex-col items-center gap-3 mb-8">
            <div class="w-16 h-16  bg-red-500/20 flex items-center justify-center">
                <span class="material-symbols-outlined text-primary text-4xl">admin_panel_settings</span>
            </div>
            <div>
                <h1 class="font-logo text-[28px] font-bold text-primary tracking-tight uppercase">Control de Red</h1>
                <p class="text-sm text-white/60 mt-1">Modo Organizador - Broadcast P2P</p>
            </div>
        </div>

                <div id="status-box" class="mb-6 p-4  border border-white/10 bg-black/20 flex items-center justify-between">
            <span class="text-sm font-medium">Estado WebRTC:</span>
            <span id="status-text" class="text-xs font-mono px-2 py-1  bg-yellow-500/20 text-yellow-400 border border-yellow-500/30">CONECTANDO...</span>
        </div>

        <div class="mb-6 p-4  border border-white/10 bg-black/20">
            <h3 class="text-xs tracking-widest text-white/70 uppercase font-medium mb-3 flex items-center gap-2"><span class="material-symbols-outlined text-[16px] text-yellow-400">warning</span> Simulador de Red (QoS)</h3>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-2">
                <button type="button" class="btn-qos px-2 py-2  border border-green-500/30 bg-green-500/10 text-green-400 text-xs font-bold hover:bg-green-500/20 transition-all ring-2 ring-white" data-latency="0">0ms (Normal)</button>
                <button type="button" class="btn-qos px-2 py-2  border border-yellow-500/30 bg-yellow-500/10 text-yellow-400 text-xs font-bold hover:bg-yellow-500/20 transition-all" data-latency="50">50ms (Baja)</button>
                <button type="button" class="btn-qos px-2 py-2  border border-orange-500/30 bg-orange-500/10 text-orange-400 text-xs font-bold hover:bg-orange-500/20 transition-all" data-latency="200">200ms (Media)</button>
                <button type="button" class="btn-qos px-2 py-2  border border-red-500/30 bg-red-500/10 text-red-400 text-xs font-bold hover:bg-red-500/20 transition-all" data-latency="500">500ms (Crítica)</button>
            </div>
        </div>

        <form id="broadcast-form" class="flex flex-col gap-4">
            <div class="flex flex-col gap-2">
                <label class="text-xs tracking-widest text-white/70 uppercase font-medium" for="message">Mensaje de Alerta Global</label>
                <textarea id="message" rows="4" class="input-field  p-4 resize-none font-medium" placeholder="Escribe el anuncio para todos los celulares..."></textarea>
            </div>
            <button id="btn-send" class="btn-primary w-full  h-[56px] flex items-center justify-center gap-2 mt-2" disabled type="submit">
                <span class="material-symbols-outlined text-[22px]">campaign</span>
                EMITIR BROADCAST
            </button>
        </form>
        <div class="h-px bg-outline-variant/30 w-full my-4"></div>

        <div class="flex flex-col gap-4">
            <h2 class="text-white font-bold flex items-center gap-2"><span class="material-symbols-outlined text-primary">lightbulb</span> Lanzar Trivia Rápida</h2>
            <div class="flex flex-col gap-2">
                <input id="trivia-q" class="input-field  p-3 text-sm" placeholder="Ej: ¿Qué protocolo usa la web?" type="text" value="¿Qué significa QoS en redes?">
                <input id="trivia-o1" class="input-field  p-2 text-xs" placeholder="Opción 1" type="text" value="Quality of Service">
                <input id="trivia-o2" class="input-field  p-2 text-xs" placeholder="Opción 2" type="text" value="Quantity of Speed">
                <input id="trivia-o3" class="input-field  p-2 text-xs" placeholder="Opción 3" type="text" value="Query over Socket">
                <input id="trivia-o4" class="input-field  p-2 text-xs" placeholder="Opción 4" type="text" value="Quick Operating System">
            </div>
            <button id="btn-trivia" class="btn-primary w-full  h-[48px] flex items-center justify-center gap-2">
                <span class="material-symbols-outlined text-[20px]">rocket_launch</span> INICIAR TRIVIA GLOBAL
            </button>
        </div>

        <div class="h-px bg-outline-variant/30 w-full my-4"></div>

        <div class="flex flex-col gap-4">
            <h2 class="text-white font-bold flex items-center gap-2"><span class="material-symbols-outlined text-primary">robot_2</span> Simulador de Tráfico (Bots)</h2>
            <div class="flex items-center justify-between bg-black/20 p-4  border border-white/10">
                <div>
                    <div class="text-sm font-bold text-white">Bots en segundo plano</div>
                    <div class="text-xs text-white/50 mt-1">Lanza 5 bots que interactúan en la red</div>
                </div>
                <button id="btn-toggle-bots" class="px-4 py-2  border border-green-500/30 bg-green-500/10 text-green-400 text-xs font-bold hover:bg-green-500/20 transition-all flex items-center gap-2">
                    <span class="material-symbols-outlined text-[16px]">play_arrow</span> INICIAR
                </button>
            </div>
            <div id="bots-container" class="hidden"></div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/shared/config.js"></script>
    <script src="/shared/protocol.js"></script>
    <script src="webrtc.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('broadcast-form');
            const messageInput = document.getElementById('message');
            const btnSend = document.getElementById('btn-send');
            const statusText = document.getElementById('status-text');

            // Connect as Organizer (no specific zone)
            WebRTCEngine.conectar("ORGANIZADOR", "Control");

            // Simple polling to check connection state (since Mock/WebRTC connects almost instantly)
            setInterval(() => {
                const peers = WebRTCEngine.getPeers();
                if (peers.length > 0) {
                    statusText.textContent = `CONECTADO (${peers.length} PEERS)`;
                    statusText.className = "text-xs font-mono px-2 py-1  bg-green-500/20 text-green-400 border border-green-500/30";
                    if (messageInput.value.trim().length > 0) {
                        btnSend.disabled = false;
                    }
                } else {
                    statusText.textContent = "ESPERANDO PEERS...";
                    statusText.className = "text-xs font-mono px-2 py-1  bg-yellow-500/20 text-yellow-400 border border-yellow-500/30";
                    btnSend.disabled = true;
                }
            }, 1000);

            messageInput.addEventListener('input', (e) => {
                const peers = WebRTCEngine.getPeers();
                btnSend.disabled = e.target.value.trim().length === 0 || peers.length === 0;
            });

            form.addEventListener('submit', (e) => {
                e.preventDefault();
                const text = messageInput.value.trim();
                if (text) {
                    // Send to all peers via P2P
                    WebRTCEngine.broadcast(PROTOCOL.ORGANIZER_BROADCAST, { text: text });
                    messageInput.value = '';
                    btnSend.disabled = true;
                    
                    // Visual feedback
                    const originalText = btnSend.innerHTML;
                    btnSend.innerHTML = '<span class="material-symbols-outlined">check_circle</span> ¡EMITIDO!';
                    btnSend.classList.add('bg-green-600');
                    setTimeout(() => {
                        btnSend.innerHTML = originalText;
                        btnSend.classList.remove('bg-green-600');
                    }, 2000);
                }
            });

            document.querySelectorAll('.btn-qos').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const latency = parseInt(e.target.dataset.latency);
                    WebRTCEngine.broadcast(PROTOCOL.SET_LATENCY, { latency: latency });
                    
                    document.querySelectorAll('.btn-qos').forEach(b => b.classList.remove('ring-2', 'ring-white'));
                    e.target.classList.add('ring-2', 'ring-white');
                });
            });

            document.getElementById('btn-trivia').addEventListener('click', () => {
                const q = document.getElementById('trivia-q').value.trim();
                const o1 = document.getElementById('trivia-o1').value.trim();
                const o2 = document.getElementById('trivia-o2').value.trim();
                const o3 = document.getElementById('trivia-o3').value.trim();
                const o4 = document.getElementById('trivia-o4').value.trim();
                
                if (q && o1 && o2 && o3 && o4) {
                    WebRTCEngine.broadcast(PROTOCOL.TRIVIA_START, {
                        question: q,
                        options: [o1, o2, o3, o4]
                    });
                    
                    const btn = document.getElementById('btn-trivia');
                    const originalText = btn.innerHTML;
                    btn.innerHTML = '<span class="material-symbols-outlined">check_circle</span> TRIVIA ENVIADA';
                    btn.classList.add('bg-green-600');
                    setTimeout(() => {
                        btn.innerHTML = originalText;
                        btn.classList.remove('bg-green-600');
                    }, 2000);
                }
            });

            let botsActive = false;
            document.getElementById('btn-toggle-bots').addEventListener('click', (e) => {
                const container = document.getElementById('bots-container');
                const btn = e.currentTarget;
                
                if (!botsActive) {
                    botsActive = true;
                    btn.innerHTML = '<span class="material-symbols-outlined text-[16px]">stop</span> DETENER';
                    btn.className = 'px-4 py-2  border border-red-500/30 bg-red-500/10 text-red-400 text-xs font-bold hover:bg-red-500/20 transition-all flex items-center gap-2';
                    
                    for (let i = 1; i <= 5; i++) {
                        const iframe = document.createElement('iframe');
                        iframe.src = `bot.html?id=${i}`;
                        iframe.style.display = 'none';
                        container.appendChild(iframe);
                    }
                } else {
                    botsActive = false;
                    btn.innerHTML = '<span class="material-symbols-outlined text-[16px]">play_arrow</span> INICIAR';
                    btn.className = 'px-4 py-2  border border-green-500/30 bg-green-500/10 text-green-400 text-xs font-bold hover:bg-green-500/20 transition-all flex items-center gap-2';
                    container.innerHTML = '';
                }
            });
        });
    </script>
</body>
</html>
