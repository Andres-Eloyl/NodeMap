<!DOCTYPE html>
<html class="dark" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>NodeMap - Live Network Stats</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: { primary: "#ffb3ad", secondary: "#44e2cd", background: "#13121d", surface: "#1f1e2a" },
                    fontFamily: { sans: ["Montserrat", "sans-serif"], logo: ["Space Grotesk", "sans-serif"], mono: ["JetBrains Mono", "monospace"] }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="display.css">
    <!-- D3.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
</head>
<body class="h-screen w-screen flex flex-col bg-background text-white p-4 md:p-8 overflow-hidden relative">
    
    <!-- Background grid & glow -->
    <div class="absolute inset-0 z-0 pointer-events-none opacity-20" style="background-image: radial-gradient(circle at 50% 50%, rgba(255, 179, 173, 0.1) 0%, transparent 50%);"></div>
    <div class="absolute inset-0 z-0 opacity-[0.03] pointer-events-none" style="background-image: linear-gradient(rgba(255, 255, 255, 0.1) 1px, transparent 1px), linear-gradient(90deg, rgba(255, 255, 255, 0.1) 1px, transparent 1px); background-size: 40px 40px;"></div>

    <div class="relative z-10 flex-grow flex flex-col max-w-[1400px] w-full mx-auto">
        <!-- HEADER -->
        <header class="flex justify-between items-center mb-8">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 rounded-xl bg-primary/20 flex items-center justify-center border border-primary/30 shadow-[0_0_15px_rgba(255,179,173,0.3)]">
                    <span class="material-symbols-outlined text-primary text-3xl">hub</span>
                </div>
                <div>
                    <h1 class="font-logo text-3xl font-bold tracking-tight text-white uppercase">NodeMap <span class="text-primary">Pulse</span></h1>
                    <p class="text-white/60 text-sm font-medium tracking-widest uppercase">Estadísticas P2P en Vivo</p>
                </div>
            </div>
            <div class="flex items-center gap-3 bg-surface/50 border border-white/10 px-4 py-2 rounded-full backdrop-blur-md">
                <div class="w-3 h-3 rounded-full bg-green-400 animate-pulse"></div>
                <span class="font-mono text-sm text-green-400 font-medium tracking-wide">MESH ACTIVA</span>
            </div>
        </header>

        <!-- KPIS -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <!-- KPI 1 -->
            <div class="glass-card rounded-2xl p-6 relative overflow-hidden group">
                <div class="absolute top-0 right-0 w-32 h-32 bg-primary/10 rounded-full blur-2xl -mr-10 -mt-10 transition-transform group-hover:scale-150"></div>
                <div class="relative z-10 flex items-start justify-between">
                    <div>
                        <p class="text-white/60 text-xs font-bold uppercase tracking-widest mb-1">Nodos Activos</p>
                        <h2 id="kpi-nodes" class="font-logo text-5xl font-bold text-white">0</h2>
                    </div>
                    <span class="material-symbols-outlined text-primary/80 text-4xl">share_windows</span>
                </div>
            </div>
            <!-- KPI 2 -->
            <div class="glass-card rounded-2xl p-6 relative overflow-hidden group">
                <div class="absolute top-0 right-0 w-32 h-32 bg-secondary/10 rounded-full blur-2xl -mr-10 -mt-10 transition-transform group-hover:scale-150"></div>
                <div class="relative z-10 flex items-start justify-between">
                    <div>
                        <p class="text-white/60 text-xs font-bold uppercase tracking-widest mb-1">Peak Simultáneo</p>
                        <h2 id="kpi-peak" class="font-logo text-5xl font-bold text-white">0</h2>
                    </div>
                    <span class="material-symbols-outlined text-secondary/80 text-4xl">trending_up</span>
                </div>
            </div>
            <!-- KPI 3 -->
            <div class="glass-card rounded-2xl p-6 relative overflow-hidden group">
                <div class="absolute top-0 right-0 w-32 h-32 bg-purple-500/10 rounded-full blur-2xl -mr-10 -mt-10 transition-transform group-hover:scale-150"></div>
                <div class="relative z-10 flex items-start justify-between">
                    <div>
                        <p class="text-white/60 text-xs font-bold uppercase tracking-widest mb-1">Tráfico Total (Msjs)</p>
                        <h2 id="kpi-messages" class="font-logo text-5xl font-bold text-white">0</h2>
                    </div>
                    <span class="material-symbols-outlined text-purple-400/80 text-4xl">swap_calls</span>
                </div>
            </div>
        </div>

        <!-- D3 CHART CONTAINER -->
        <div class="flex-grow glass-card rounded-3xl p-6 relative flex flex-col">
            <div class="flex justify-between items-center mb-4">
                <h3 class="font-bold text-lg tracking-wide flex items-center gap-2">
                    <span class="material-symbols-outlined text-primary">bar_chart</span>
                    Flujo de Mensajes por Segundo
                </h3>
                <span class="text-xs font-mono text-white/50 bg-black/30 px-2 py-1 rounded">Últimos 60s</span>
            </div>
            <div id="chart-container" class="flex-grow w-full relative">
                <!-- D3 SVG will be injected here -->
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="/socket.io/socket.io.js"></script>
    <script src="/shared/config.js"></script>
    <script src="/shared/protocol.js"></script>
    <script src="webrtc.js"></script>
    <script src="display.js"></script>
</body>
</html>
